---
applications:
  - name: alist-rclone
    memory: 2048M    
    disk_quota: 4096M       # 硬盘给 1G (注意！ 硬盘大小要大于镜像大小)        
    random-route: true                
    docker:
      image: ghcr.io/workerspages/alist-rclone:main
    env:
      TZ: "Asia/Shanghai"       

      # 1. 填入你 VPS 上配置好的 rclone.conf 文件的 Base64 编码
      RCLONE_CONF_BASE64: "在此处填入rclone.conf的完整Base64编码字符串"
      
      # 2. 填入你 VPS 上配置好的 scheduled-tasks.json 文件的 Base64 编码
      SCHEDULED_TASKS_BASE64: "在此处填入scheduled-tasks.json的完整Base64编码字符串"
      
    # 最终完整启动命令：创建数据目录 -> 还原配置和定时任务文件 -> 启动应用主进程
    command: "mkdir -p /data/rclone /opt/alist/data/rclone && echo $RCLONE_CONF_BASE64 | base64 -d > /data/rclone/rclone.conf && echo $SCHEDULED_TASKS_BASE64 | base64 -d > /data/rclone/scheduled-tasks.json && cp -r /data/rclone/* /opt/alist/data/rclone/ 2>/dev/null || true && /usr/bin/supervisord -n -c /etc/supervisord.conf"
