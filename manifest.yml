---
applications:
  - name: alist-rclone
    memory: 2048M    
    disk_quota: 2048M       # 硬盘给 1G (注意！ 硬盘大小要大于镜像大小)        
    random-route: true                
    docker:
      image: ghcr.io/workerspages/alist-rclone:main
    env:
      TZ: "Asia/Shanghai" 
      SYNC_INTERVAL: "9999999999" 
